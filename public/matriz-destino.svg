<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" opacity="0.06">
  <!-- Outer circle -->
  <circle cx="300" cy="300" r="250" stroke="#7c5cbf" stroke-width="0.8"/>
  <circle cx="300" cy="300" r="248" stroke="#7c5cbf" stroke-width="0.3"/>

  <!-- Inner circle -->
  <circle cx="300" cy="300" r="140" stroke="#7c5cbf" stroke-width="0.6"/>

  <!-- Diamond (Losango principal da Matriz) -->
  <polygon points="300,50 550,300 300,550 50,300" stroke="#7c5cbf" stroke-width="1" fill="none"/>

  <!-- Inner diamond -->
  <polygon points="300,160 440,300 300,440 160,300" stroke="#7c5cbf" stroke-width="0.8" fill="none"/>

  <!-- Cross lines through center -->
  <line x1="300" y1="50" x2="300" y2="550" stroke="#7c5cbf" stroke-width="0.5"/>
  <line x1="50" y1="300" x2="550" y2="300" stroke="#7c5cbf" stroke-width="0.5"/>

  <!-- Diagonal lines (connecting diamond corners to inner diamond) -->
  <line x1="300" y1="50" x2="160" y2="300" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="300" y1="50" x2="440" y2="300" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="550" y1="300" x2="300" y2="160" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="550" y1="300" x2="300" y2="440" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="300" y1="550" x2="440" y2="300" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="300" y1="550" x2="160" y2="300" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="50" y1="300" x2="300" y2="160" stroke="#7c5cbf" stroke-width="0.4"/>
  <line x1="50" y1="300" x2="300" y2="440" stroke="#7c5cbf" stroke-width="0.4"/>

  <!-- Smallest diamond -->
  <polygon points="300,220 380,300 300,380 220,300" stroke="#7c5cbf" stroke-width="0.5" fill="none"/>

  <!-- Node circles — outer diamond points -->
  <circle cx="300" cy="50" r="8" fill="#7c5cbf" opacity="0.3"/>
  <circle cx="550" cy="300" r="8" fill="#7c5cbf" opacity="0.3"/>
  <circle cx="300" cy="550" r="8" fill="#7c5cbf" opacity="0.3"/>
  <circle cx="50" cy="300" r="8" fill="#7c5cbf" opacity="0.3"/>

  <!-- Node circles — inner diamond points -->
  <circle cx="300" cy="160" r="6" fill="#7c5cbf" opacity="0.25"/>
  <circle cx="440" cy="300" r="6" fill="#7c5cbf" opacity="0.25"/>
  <circle cx="300" cy="440" r="6" fill="#7c5cbf" opacity="0.25"/>
  <circle cx="160" cy="300" r="6" fill="#7c5cbf" opacity="0.25"/>

  <!-- Node circles — smallest diamond -->
  <circle cx="300" cy="220" r="4" fill="#7c5cbf" opacity="0.2"/>
  <circle cx="380" cy="300" r="4" fill="#7c5cbf" opacity="0.2"/>
  <circle cx="300" cy="380" r="4" fill="#7c5cbf" opacity="0.2"/>
  <circle cx="220" cy="300" r="4" fill="#7c5cbf" opacity="0.2"/>

  <!-- Center node -->
  <circle cx="300" cy="300" r="10" fill="#7c5cbf" opacity="0.15"/>
  <circle cx="300" cy="300" r="4" fill="#7c5cbf" opacity="0.3"/>

  <!-- Subtle cardinal mid-point nodes -->
  <circle cx="425" cy="175" r="3" fill="#b8860b" opacity="0.2"/>
  <circle cx="175" cy="175" r="3" fill="#b8860b" opacity="0.2"/>
  <circle cx="425" cy="425" r="3" fill="#b8860b" opacity="0.2"/>
  <circle cx="175" cy="425" r="3" fill="#b8860b" opacity="0.2"/>

  <!-- Small decorative arcs -->
  <path d="M 300 50 A 20 20 0 0 1 320 70" stroke="#7c5cbf" stroke-width="0.4" fill="none"/>
  <path d="M 550 300 A 20 20 0 0 1 530 320" stroke="#7c5cbf" stroke-width="0.4" fill="none"/>
  <path d="M 300 550 A 20 20 0 0 1 280 530" stroke="#7c5cbf" stroke-width="0.4" fill="none"/>
  <path d="M 50 300 A 20 20 0 0 1 70 280" stroke="#7c5cbf" stroke-width="0.4" fill="none"/>
</svg>
